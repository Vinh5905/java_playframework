play.http.secret.key = "url-shortener-secret-key-change-in-production"
play.http.secret.key = ${?APP_SECRET}

play.filters.hosts {
  allowed = ["localhost", "localhost:9000", "127.0.0.1", "127.0.0.1:9000"]
}

# CORS - cho phép frontend gọi API
play.filters.cors {
  allowedOrigins = ["http://localhost:3000"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Authorization"]
}

# Tắt CSRF cho REST API (dùng JWT thay thế)
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# Filters
play.filters.enabled += "filters.RequestLoggingFilter"
play.filters.enabled += "filters.RateLimitFilter"

# Database
db {
  default {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/urlshortener"
    url = ${?DATABASE_URL}
    username = "urluser"
    username = ${?DATABASE_USER}
    password = "urlpass"
    password = ${?DATABASE_PASSWORD}

    hikaricp {
      maximumPoolSize = 10
      minimumIdle = 2
      connectionTimeout = 30000
      idleTimeout = 600000
      maxLifetime = 1800000
    }
  }
}

# Evolutions
play.evolutions {
  db.default.enabled = true
  db.default.autoApply = true  # CHỈ trong dev!
}

# Custom dispatchers
blocking-db-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 10
  }
  throughput = 1
}

# JWT config
jwt {
  secret = "jwt-secret-key-must-be-at-least-32-characters-long"
  secret = ${?JWT_SECRET}
  expirationHours = 24
}

# URL Shortener config
urlshortener {
  baseUrl = "http://localhost:9000"
  baseUrl = ${?BASE_URL}
  codeLength = 6
}
