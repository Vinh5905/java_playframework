play.http.secret.key = "benchmark-secret-key"

play.filters.hosts {
  allowed = ["localhost", "localhost:9000", "127.0.0.1", "127.0.0.1:9000"]
}

play.filters.disabled += "play.filters.csrf.CSRFFilter"

# ============================================================
# Dispatcher cho blocking I/O - 50 threads
# Đây là điểm mấu chốt của benchmark
# ============================================================
blocking-io-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 50
  }
  throughput = 1
}

# Tăng default dispatcher để quan sát rõ hơn
pekko.actor.default-dispatcher {
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 2.0
    parallelism-max = 8
  }
}
