## Play Framework Application Configuration
## Format: HOCON (Human-Optimized Config Object Notation)
## https://github.com/lightbend/config

# Secret key dùng để sign session cookie và CSRF token
# PRODUCTION: Thay bằng giá trị ngẫu nhiên dài, lưu trong env var
play.http.secret.key = "changeme-in-production-use-random-64-char-string"

# Filters mặc định - CSRF, Security Headers, etc.
play.filters.hosts {
  # Cho phép localhost trong dev mode
  allowed = ["localhost", "localhost:9000", "127.0.0.1", "127.0.0.1:9000"]
}
