services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatapp"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: chatuser
      MONGO_INITDB_ROOT_PASSWORD: chatpass
      MONGO_INITDB_DATABASE: chatapp
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "chatuser", "-p", "chatpass", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: chat-backend:1.0-SNAPSHOT
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      APP_SECRET: "change-this-in-production"
      CHAT_PERSISTENCE_EXTERNAL: "true"
      EVOLUTIONS_ENABLED: "true"
      EVOLUTIONS_AUTO_APPLY: "true"
      DATABASE_URL: "jdbc:postgresql://postgres:5432/chatapp"
      DATABASE_USER: "chatuser"
      DATABASE_PASSWORD: "chatpass"
      MONGODB_URI: "mongodb://chatuser:chatpass@mongo:27017/chatapp?authSource=admin"
    ports:
      - "9000:9000"

volumes:
  postgres_data:
  mongo_data:
