play.http.secret.key = "chat-dev-secret-key"
play.http.secret.key = ${?APP_SECRET}

play.filters.hosts {
  allowed = ["localhost", "localhost:9000", "127.0.0.1", "127.0.0.1:9000"]
}

play.filters.cors {
  allowedOrigins = ["http://localhost:3000", "http://127.0.0.1:3000"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Authorization"]
  preflightMaxAge = 1 hour
}

play.filters.disabled += "play.filters.csrf.CSRFFilter"
play.modules.enabled += "modules.AppModule"

# PostgreSQL
db {
  default {
    driver   = "org.postgresql.Driver"
    url      = "jdbc:postgresql://localhost:5432/chatapp"
    url      = ${?DATABASE_URL}
    username = "chatuser"
    username = ${?DATABASE_USER}
    password = "chatpass"
    password = ${?DATABASE_PASSWORD}

    hikaricp {
      maximumPoolSize   = 10
      minimumIdle       = 2
      connectionTimeout = 30000
      idleTimeout       = 600000
      maxLifetime       = 1800000
    }
  }
}

play.evolutions {
  db.default.enabled   = true
  db.default.autoApply = true
}

blocking-db-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 10
  }
  throughput = 1
}

# MongoDB
mongodb {
  uri = "mongodb://chatuser:chatpass@localhost:27017/chatapp?authSource=admin"
  uri = ${?MONGODB_URI}
}

# OpenAI
openai {
  apiKey    = "changeme"
  apiKey    = ${?OPENAI_API_KEY}
  model     = "gpt-4o-mini"
  maxTokens = 500
  baseUrl   = "https://api.openai.com/v1"
}
