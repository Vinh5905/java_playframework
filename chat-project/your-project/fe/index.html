<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ==================== ACCOUNT SWITCHER MODAL ==================== -->
<div class="overlay" id="accountOverlay">
  <div class="account-modal">
    <h2>👤 Chọn tài khoản</h2>
    <p>Đây là mô phỏng account switcher. Chọn tài khoản để bắt đầu chat.</p>
    <div class="account-list" id="accountList"></div>
  </div>
</div>

<!-- ==================== MAIN APP ==================== -->
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Sidebar header -->
    <div class="sidebar-header">
      <div class="sidebar-title-wrap">
        <span class="sidebar-title">Messages</span>
        <span class="badge" id="unreadBadge">0</span>
      </div>
      <button class="btn-icon btn-new" onclick="showNewConvModal()" title="New chat">＋</button>
    </div>

    <!-- Current account bar (click to switch) -->
    <div class="current-account-bar" id="currentAccountBar" onclick="showAccountSwitcher()">
      <div class="avatar-sm" id="currentAccountAvatar"></div>
      <div class="current-account-info">
        <span class="current-account-name" id="currentAccountName">Loading...</span>
        <span class="current-account-sub">Tap to switch account</span>
      </div>
      <span class="switch-icon">⇄</span>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search messages" oninput="filterConversations(this.value)" />
    </div>

    <!-- Conversation list -->
    <div class="conv-list" id="convList">
      <div class="loading-state">Loading conversations...</div>
    </div>
  </aside>

  <!-- CHAT AREA -->
  <main class="chat-main" id="chatMain">
    <!-- Empty state (no conversation selected) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <h3>Select a conversation</h3>
      <p>Choose a conversation from the left to start chatting</p>
    </div>

    <!-- Chat window (hidden until conversation selected) -->
    <div class="chat-window" id="chatWindow" style="display:none;">

      <!-- Chat header -->
      <div class="chat-header">
        <div class="chat-user-info" id="chatUserInfo">
          <div class="avatar-md" id="chatPartnerAvatar"></div>
          <div>
            <div class="chat-partner-name" id="chatPartnerName"></div>
            <div class="chat-partner-status" id="chatPartnerStatus"></div>
          </div>
        </div>
        <button class="btn-call" onclick="alert('📞 Calling... (feature coming soon)')">
          <span>📞</span> Call
        </button>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea">
        <!-- Messages rendered by JS -->
      </div>

      <!-- Typing indicator -->
      <div class="typing-bar" id="typingBar" style="display:none;">
        <div class="typing-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <span id="typingText"></span>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <button class="btn-icon btn-emoji" onclick="toggleEmojiPicker()">😊</button>
        <input
          class="msg-input"
          id="msgInput"
          placeholder="Type a message"
          onkeydown="handleInputKeydown(event)"
          oninput="handleTyping()"
        />
        <button class="btn-send" id="btnSend" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>

</div>

<!-- Scripts (order matters!) -->
<script src="js/config.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/api.js"></script>
<script src="js/websocket.js"></script>
<script src="js/app.js"></script>
</body>
</html>
