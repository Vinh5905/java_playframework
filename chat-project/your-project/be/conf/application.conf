# application.conf - Chat Backend (Tuần 1)
# Cập nhật dần theo hướng dẫn từng tuần

# ── Bắt buộc ────────────────────────────────────────────────
play.http.secret.key = "chat-dev-secret-key-change-in-production"

# ── Allowed Hosts ────────────────────────────────────────────
play.filters.hosts {
  allowed = ["localhost", "localhost:9000", "127.0.0.1", "127.0.0.1:9000"]
}

# ── CORS: Cho phép Frontend port 3000 gọi API ──────────────
play.filters.cors {
  allowedOrigins = ["http://localhost:3000", "http://127.0.0.1:3000"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Authorization"]
  preflightMaxAge = 1 hour
}

# ── REST API → Tắt CSRF (dùng JWT/token thay thế) ──────────
play.filters.disabled += "play.filters.csrf.CSRFFilter"

